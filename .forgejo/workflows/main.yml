name: Lint checks
on: [push, pull_request, workflow_dispatch]
enable-email-notifications: true
jobs:
  fish:
    runs-on: docker
    uses: https://codeberg.org/nathanchance/actions-workflows/.forgejo/workflows/fish_format.yml@main
  python:
    runs-on: docker
    strategy:
      fail-fast: false
      matrix:
        version: ['3.15', '3.14', '3.13', '3.12', '3.11', '3.10']
    uses: https://codeberg.org/nathanchance/actions-workflows/.forgejo/workflows/python_lint.yml@main
    with:
      python_version: ${{ matrix.version }}
